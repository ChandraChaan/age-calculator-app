name: agely
description: A lightweight Material 3 age calculator built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  flutter_timezone: ^5.1.0
  intl: ^0.20.2
  provider: ^6.1.5
  share_plus: ^13.2.0
  shared_preferences: ^2.5.5
  timezone: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
